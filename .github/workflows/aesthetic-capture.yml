name: Aesthetic Capture Daily Run

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  capture-thumbnails:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push commits to the repository

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: main
          path: main-repo

      - name: Checkout images branch
        uses: actions/checkout@v5
        with:
          ref: images
          path: images-repo
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          uv pip install --system yt-dlp

      - name: Create cookies file
        working-directory: main-repo
        run: |
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            # Use printf to avoid echo interpreting escape sequences and adding extra newlines
            printf '%s\n' "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
            echo "Cookies file created"
            echo "Cookie file size: $(wc -c < cookies.txt) bytes"
            echo "Cookie file lines: $(wc -l < cookies.txt) lines"
            # Show first line (should be Netscape cookie file header)
            echo "First line: $(head -n 1 cookies.txt)"
          else
            echo "No cookies secret found - bot detection may block some videos"
          fi

      - name: Copy existing thumbnails from images branch
        run: |
          # Copy existing channel directories from images to main workspace
          # This allows the script to skip already-downloaded videos
          for dir in images-repo/*/; do
            if [ -d "$dir" ]; then
              channel_name=$(basename "$dir")
              if [ "$channel_name" != ".github" ]; then
                echo "Copying existing thumbnails for: $channel_name"
                mkdir -p "main-repo/$channel_name"
                cp -r "$dir"* "main-repo/$channel_name/" 2>/dev/null || true
              fi
            fi
          done
          echo "Existing thumbnails copied successfully"

      - name: Run aesthetic capture script
        working-directory: main-repo
        run: |
          python aestheticcapture.py

      - name: Copy channel directories to images branch
        run: |
          # Copy all channel directories from main branch to images branch
          # Find all directories in main-repo (excluding hidden dirs and main-repo itself)
          for dir in main-repo/*/; do
            if [ -d "$dir" ] && [ "$(basename "$dir")" != ".github" ]; then
              channel_name=$(basename "$dir")
              echo "Copying channel: $channel_name"
              mkdir -p "images-repo/$channel_name"
              cp -r "$dir"* "images-repo/$channel_name/" 2>/dev/null || true
            fi
          done

      - name: Commit and push channel images to images
        working-directory: images-repo
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"

          # Add all channel directories (this will add any new images)
          git add . || true

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No new images to commit"
          else
            git commit -m "$(cat <<'EOF'
          Update channel images from daily capture

          Automated thumbnail capture run on $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          Generated by GitHub Actions
          EOF
          )"
            git push
          fi

      - name: Clean up
        if: always()
        run: |
          rm -rf main-repo images-repo
